name: sigmap-gain-dashboard

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  gain-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Generate gain dashboard
        run: |
          npx sigmap gain --all --json > gain-report.json
          npx sigmap --dashboard
      - uses: actions/upload-artifact@v4
        with:
          name: sigmap-gain-dashboard
          path: |
            gain-report.json
            benchmarks/reports/dashboard.html
